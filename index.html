<script>
(function() {
  const canvas  = document.getElementById('particle-canvas');
  const splash  = document.getElementById('splash');
  const ctx     = canvas.getContext('2d');
  let particles = [];
  let animId    = null;
  let started   = false;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function randomColor() {
    const colors = ['#e31837','#c8102e','#ff4d6d','#ff758f','#ffffff','#f8faff','#1a1a1a','#cc0022'];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function createParticles() {
    particles = [];
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;
    for (let i = 0; i < 260; i++) {
      const angle  = Math.random() * Math.PI * 2;
      const speed  = 4 + Math.random() * 14;
      const size   = 3 + Math.random() * 7;
      const shape  = Math.random() > 0.5 ? 'circle' : 'rect';
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (Math.random() * 4),
        size, color: randomColor(), alpha: 1,
        decay: 0.012 + Math.random() * 0.018,
        gravity: 0.18 + Math.random() * 0.12,
        shape,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.18,
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.alpha <= 0) return;
      alive = true;
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.98;
      p.alpha -= p.decay;
      p.rotation += p.rotSpeed;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle   = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.55);
      }
      ctx.restore();
    });
    if (alive) {
      animId = requestAnimationFrame(drawParticles);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.style.opacity = '0';
    }
  }

  function burst() {
    if (started) return;
    started = true;
    splash.classList.add('hidden');
    canvas.style.opacity = '1';
    createParticles();
    setTimeout(() => {
      splash.style.display = 'none';
      drawParticles();
    }, 400);
  }

  window.__splashBurst = burst;
  setTimeout(burst, 2800);
})();
</script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Storage ───────────────────────────────────────────────────────────────────
const SK = { contacts:'mic2_contacts', deals:'mic2_deals', tasks:'mic2_tasks', interactions:'mic2_interactions', campaigns:'mic2_campaigns' };
const store = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };
const load  = (key, def) => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; } };
const useLS = (key, def) => {
  const [v, sv] = useState(() => load(key, def));
  const set = x => { const n = typeof x === 'function' ? x(v) : x; sv(n); store(key, n); };
  return [v, set];
};

const uid   = () => Math.random().toString(36).slice(2,9);
const now   = () => new Date().toISOString();
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = iso => { if (!iso) return ''; const d = new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const fmtTime = iso => { if (!iso) return ''; const d = new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); };
const timeAgo = iso => {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
};

const STAGES = ['Lead','Contacted','Proposal','Negotiation','Closed Won','Closed Lost'];
const STAGE_COLOR = { Lead:'#6366f1', Contacted:'#f59e0b', Proposal:'#2563eb', Negotiation:'#7c3aed', 'Closed Won':'#059669', 'Closed Lost':'#dc2626' };
const CTYPES = ['Lead','Client','Partner','Prospect','Referral'];
const ITYPE_CONFIG = {
  Call:    { icon:'📞', color:'#2563eb' },
  Email:   { icon:'✉️',  color:'#7c3aed' },
  Meeting: { icon:'🤝', color:'#059669' },
  Note:    { icon:'📝', color:'#d97706' },
};
const TYPE_COLOR = { Lead:'#f59e0b', Client:'#059669', Partner:'#2563eb', Prospect:'#7c3aed', Referral:'#db2777' };

// ── Design tokens ─────────────────────────────────────────────────────────────
const avatar = (name, size=40) => {
  const colors = ['#2563eb','#7c3aed','#db2777','#059669','#d97706','#0891b2'];
  const i = name.charCodeAt(0) % colors.length;
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:colors[i], display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:size*0.4, flexShrink:0 }}>
      {name[0].toUpperCase()}
    </div>
  );
};

const Badge = ({ label, color }) => (
  <span style={{ background:color+'18', color, border:`1px solid ${color}28`, borderRadius:99, padding:'2px 9px', fontSize:11, fontWeight:700, letterSpacing:'0.03em', whiteSpace:'nowrap' }}>
    {label}
  </span>
);

const Card = ({ children, style }) => (
  <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius)', boxShadow:'var(--shadow-sm)', ...style }}>
    {children}
  </div>
);

const Btn = ({ children, variant='primary', size='md', onClick, style:s, disabled }) => {
  const pad = size === 'sm' ? '6px 14px' : size === 'lg' ? '13px 28px' : '10px 20px';
  const fs  = size === 'sm' ? 13 : size === 'lg' ? 15 : 14;
  const variants = {
    primary:   { background:'var(--grad)', color:'#fff', border:'none', boxShadow:'0 2px 8px rgba(37,99,235,0.25)' },
    secondary: { background:'#eff6ff', color:'#2563eb', border:'1px solid #bfdbfe' },
    ghost:     { background:'transparent', color:'var(--text2)', border:'1px solid var(--border)' },
    danger:    { background:'#fff1f2', color:'var(--red)', border:'1px solid #fecdd3' },
    dark:      { background:'var(--grad2)', color:'#fff', border:'none', boxShadow:'0 2px 8px rgba(124,58,237,0.25)' },
  };
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ ...variants[variant], padding:pad, fontSize:fs, fontWeight:600, borderRadius:'var(--radius-sm)', cursor:disabled?'not-allowed':'pointer', transition:'all 0.15s', opacity:disabled?0.5:1, display:'inline-flex', alignItems:'center', gap:6, ...(s||{}) }}
      onMouseEnter={e=>{ if(!disabled){ e.currentTarget.style.transform='translateY(-1px)'; e.currentTarget.style.opacity='0.9'; }}}
      onMouseLeave={e=>{ e.currentTarget.style.transform=''; e.currentTarget.style.opacity='1'; }}>
      {children}
    </button>
  );
};

const Input = ({ label, ...p }) => (
  <div style={{ marginBottom:16 }}>
    {label && <label style={{ display:'block', color:'var(--text2)', fontSize:12, fontWeight:600, marginBottom:5, textTransform:'uppercase', letterSpacing:'0.06em' }}>{label}</label>}
    <input {...p} style={{ width:'100%', background:'#f8faff', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'10px 12px', color:'var(--text)', fontSize:14, outline:'none', transition:'border-color 0.15s', ...(p.style||{}) }}

      onBlur={e=>e.target.style.borderColor='var(--border)'} />
  </div>
);

const Textarea = ({ label, ...p }) => (
  <div style={{ marginBottom:16 }}>
    {label && <label style={{ display:'block', color:'var(--text2)', fontSize:12, fontWeight:600, marginBottom:5, textTransform:'uppercase', letterSpacing:'0.06em' }}>{label}</label>}
    <textarea {...p} style={{ width:'100%', background:'#f8faff', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'10px 12px', color:'var(--text)', fontSize:14, outline:'none', resize:'vertical', minHeight:80, transition:'border-color 0.15s', ...(p.style||{}) }}

      onBlur={e=>e.target.style.borderColor='var(--border)'} />
  </div>
);

const Select = ({ label, children, ...p }) => (
  <div style={{ marginBottom:16 }}>
    {label && <label style={{ display:'block', color:'var(--text2)', fontSize:12, fontWeight:600, marginBottom:5, textTransform:'uppercase', letterSpacing:'0.06em' }}>{label}</label>}
    <select {...p} style={{ width:'100%', background:'#f8faff', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', padding:'10px 12px', color:'var(--text)', fontSize:14, outline:'none', ...(p.style||{}) }}>
      {children}
    </select>
  </div>
);

const Modal = ({ title, onClose, children, wide }) => (
  <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.45)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200, backdropFilter:'blur(6px)', padding:16 }}>
    <div className="modal-inner fade-up" style={{ background:'var(--surface)', borderRadius:18, padding:28, width:wide?680:480, maxWidth:'95vw', maxHeight:'90vh', overflowY:'auto', boxShadow:'var(--shadow-lg)' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <h3 style={{ fontFamily:'var(--font-display)', fontSize:20, color:'var(--text)' }}>{title}</h3>
        <button onClick={onClose} style={{ background:'#f1f5f9', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', fontSize:18, color:'var(--text2)', display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
      </div>
      {children}
    </div>
  </div>
);

// ── CONTACTS VIEW ─────────────────────────────────────────────────────────────
function ContactsView({ contacts, setContacts, deals, setDeals, tasks, setTasks, interactions, setInteractions }) {
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState('All');
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [detailContact, setDetailContact] = useState(null);
  // ── NEW: export tag filter ────────────────────────────────────────────────
  const [exportTag, setExportTag] = useState('');
  const blank = { name:'', email:'', phone:'', company:'', title:'', type:'Lead', tags:'' };
  const [form, setForm] = useState(blank);

  // Interaction form
  const [showIForm, setShowIForm] = useState(false);
  const [iForm, setIForm] = useState({ type:'Call', summary:'', date: today() });

  // ── NEW: Export contacts as CSV, optionally filtered by tag ───────────────
  const exportContacts = () => {
    const tag = exportTag.trim();
    const toExport = tag
      ? contacts.filter(c => (c.tags||[]).some(t => t.toLowerCase() === tag.toLowerCase()))
      : contacts;
    if (!toExport.length) {
      alert(tag ? `No contacts found with tag "${tag}".` : 'No contacts to export.');
      return;
    }
    const rows = toExport.map(c => ({
      Name:     c.name    || '',
      Email:    c.email   || '',
      Phone:    c.phone   || '',
      Company:  c.company || '',
      Title:    c.title   || '',
      Type:     c.type    || '',
      Tags:     (c.tags||[]).join(', '),
      LinkedIn: c.linkedin|| '',
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Contacts');
    const filename = tag
      ? `contacts-${tag.replace(/\s+/g,'-').toLowerCase()}.csv`
      : 'contacts-all.csv';
    XLSX.writeFile(wb, filename);
  };

  // ── NEW: Backfill all existing contacts with Miami tag ────────────────────
  const backfillMiamiTag = () => {
    const TAG = 'iConnections Miami 2026';
    const needsTag = contacts.filter(c => !(c.tags||[]).includes(TAG));
    if (!needsTag.length) {
      alert('All contacts already have the "iConnections Miami 2026" tag!');
      return;
    }
    if (!confirm(`Tag all ${needsTag.length} existing contacts with "${TAG}"?`)) return;
    setContacts(cs => cs.map(c => ({
      ...c,
      tags: (c.tags||[]).includes(TAG) ? (c.tags||[]) : [...(c.tags||[]), TAG],
    })));
  };

  const open = (c=null) => { setEditing(c); setForm(c?{...c, tags:(c.tags||[]).join(', ')}:blank); setShowForm(true); };
  const save = () => {
    if (!form.name.trim()) return;
    const tags = form.tags ? form.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
    const contact = { ...form, tags };
    if (editing) setContacts(cs => cs.map(c => c.id===editing.id ? {...contact, id:editing.id} : c));
    else { setContacts(cs => [...cs, {...contact, id:uid(), createdAt:now()}]); }
    setShowForm(false);
  };
  const del = id => {
    if (!confirm('Delete contact and all their data?')) return;
    setContacts(cs => cs.filter(c=>c.id!==id));
    setDeals(ds => ds.filter(d=>d.contactId!==id));
    setTasks(ts => ts.filter(t=>t.contactId!==id));
    setInteractions(is => is.filter(i=>i.contactId!==id));
    if (detailContact?.id === id) setDetailContact(null);
  };

  const logInteraction = () => {
    if (!iForm.summary.trim()) return;
    const entry = { id:uid(), contactId:detailContact.id, ...iForm, createdAt:now() };
    setInteractions(is => [entry, ...is]);
    setShowIForm(false);
    setIForm({ type:'Call', summary:'', date:today() });
  };

  const contactInteractions = detailContact ? interactions.filter(i=>i.contactId===detailContact.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)) : [];
  const contactDeals = detailContact ? deals.filter(d=>d.contactId===detailContact.id) : [];

  const filtered = contacts.filter(c => {
    const q = search.toLowerCase();
    const matchSearch = !q || c.name.toLowerCase().includes(q) || (c.company||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q);
    const matchType = filterType==='All' || c.type===filterType;
    return matchSearch && matchType;
  });

  // Collect all unique tags for the export dropdown hint
  const allTags = [...new Set(contacts.flatMap(c => c.tags||[]))].filter(Boolean).sort();

  return (
    <div className="fade-up">
      <div className="page-header" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
        <div>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:26, color:'var(--text)' }}>Contacts</h2>
          <p style={{ color:'var(--text2)', fontSize:14, marginTop:2 }}>{contacts.length} people in your network</p>
        </div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
          <Btn variant="ghost" size="sm" onClick={backfillMiamiTag}>🏷 Tag Miami Contacts</Btn>
          <Btn variant="secondary" size="sm" onClick={exportContacts}>⬇ Export CSV</Btn>
          <Btn onClick={()=>open()}>+ Add Contact</Btn>
        </div>
      </div>

      {/* Export tag filter row */}
      <div style={{ display:'flex', gap:8, marginBottom:12, alignItems:'center', background:'#f0f9ff', border:'1px solid #bae6fd', borderRadius:10, padding:'10px 14px' }}>
        <span style={{ fontSize:13, color:'#0369a1', fontWeight:600, whiteSpace:'nowrap' }}>⬇ Export filter:</span>
        <input
          value={exportTag}
          onChange={e=>setExportTag(e.target.value)}
          list="tag-options"
          placeholder={`Tag to filter export — leave blank for all contacts (${contacts.length})`}
          style={{ flex:1, background:'#fff', border:'1px solid #bae6fd', borderRadius:8, padding:'7px 12px', fontSize:13, outline:'none', color:'var(--text)' }}
        />
        <datalist id="tag-options">
          {allTags.map(t=><option key={t} value={t}/>)}
        </datalist>
        {exportTag && (
          <span style={{ fontSize:12, color:'#0369a1', whiteSpace:'nowrap', fontWeight:600 }}>
            {contacts.filter(c=>(c.tags||[]).some(t=>t.toLowerCase()===exportTag.trim().toLowerCase())).length} contacts
          </span>
        )}
      </div>

      {/* Search + filter */}
      <div style={{ display:'flex', gap:10, marginBottom:20, flexWrap:'wrap' }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search contacts…"

              <div style={{ display:'flex', flexDirection:'column', gap:10, maxHeight:320, overflowY:'auto' }}>
                {contactInteractions.map(i=>{

// ── PIPELINE VIEW ─────────────────────────────────────────────────────────────
function PipelineView({ deals, setDeals, contacts }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const blank = { title:'', contactId:'', stage:'Lead', value:'', notes:'' };
  const [form, setForm] = useState(blank);

  const open = (d=null) => { setEditing(d); setForm(d?{...d}:blank); setShowForm(true); };
  const save = () => {
    if (!form.title.trim()) return;
    if (editing) setDeals(ds=>ds.map(d=>d.id===editing.id?{...form,id:editing.id}:d));
    else setDeals(ds=>[...ds,{...form,id:uid(),createdAt:now()}]);
    setShowForm(false);
  };
  const move = (id,dir) => setDeals(ds=>ds.map(d=>{
    if(d.id!==id) return d;
    const next = STAGES[STAGES.indexOf(d.stage)+dir];
    return next?{...d,stage:next}:d;
  }));

  const total = deals.filter(d=>d.stage!=='Closed Lost').reduce((s,d)=>s+(parseFloat(d.value)||0),0);

  return (
    <div className="fade-up">
      <div className="page-header" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:26 }}>Pipeline</h2>
          <p style={{ color:'var(--text2)', fontSize:14, marginTop:2 }}>{deals.length} deals · <span style={{ color:'var(--teal)', fontWeight:700 }}>${total.toLocaleString()}</span> total value</p>
        </div>
        <Btn onClick={()=>open()}>+ Add Deal</Btn>
      </div>

      <div className="pipeline-scroll" style={{ overflowX:'auto', paddingBottom:16 }}>
        <div style={{ display:'flex', gap:14, minWidth:920 }}>
          {STAGES.map(stage=>{
            const sd = deals.filter(d=>d.stage===stage);
            const sv = sd.reduce((s,d)=>s+(parseFloat(d.value)||0),0);
            return (
              <div key={stage} style={{ flex:1, minWidth:150 }}>
                <div style={{ borderRadius:10, padding:'10px 14px', marginBottom:12, background:STAGE_COLOR[stage]+'12', borderTop:`3px solid ${STAGE_COLOR[stage]}` }}>
                  <div style={{ fontWeight:700, fontSize:11, textTransform:'uppercase', letterSpacing:'0.07em', color:STAGE_COLOR[stage] }}>{stage}</div>
                  <div style={{ color:'var(--text2)', fontSize:12, marginTop:2 }}>{sd.length} deal{sd.length!==1?'s':''} · ${sv.toLocaleString()}</div>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                  {sd.map(d=>{
                    const c = contacts.find(x=>x.id===d.contactId);
                    return (
                      <Card key={d.id} style={{ padding:14 }}>
                        <div style={{ fontWeight:700, fontSize:14, color:'var(--text)', marginBottom:6 }}>{d.title}</div>
                        {c && <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>{avatar(c.name,22)}<span style={{ color:'var(--text2)', fontSize:12 }}>{c.name}</span></div>}
                        {d.value && <div style={{ color:'var(--teal)', fontWeight:700, fontSize:14, marginBottom:8 }}>${parseFloat(d.value).toLocaleString()}</div>}
                        {d.notes && <div style={{ color:'var(--text3)', fontSize:11, fontStyle:'italic', marginBottom:8, lineHeight:1.4 }}>{d.notes}</div>}
                        <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
                          <button onClick={()=>move(d.id,-1)} style={{ background:'#f1f5f9', border:'1px solid var(--border)', borderRadius:6, color:'var(--text2)', fontSize:12, padding:'3px 8px', cursor:'pointer' }}>◀</button>
                          <button onClick={()=>move(d.id,1)}  style={{ background:'#f1f5f9', border:'1px solid var(--border)', borderRadius:6, color:'var(--text2)', fontSize:12, padding:'3px 8px', cursor:'pointer' }}>▶</button>
                          <button onClick={()=>open(d)} style={{ background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:6, color:'#2563eb', fontSize:11, padding:'3px 8px', cursor:'pointer', fontWeight:600 }}>Edit</button>
                          <button onClick={()=>{if(confirm('Delete?'))setDeals(ds=>ds.filter(x=>x.id!==d.id));}} style={{ background:'#fff1f2', border:'1px solid #fecdd3', borderRadius:6, color:'var(--red)', fontSize:11, padding:'3px 8px', cursor:'pointer' }}>✕</button>
                        </div>
                      </Card>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {showForm && (
        <Modal title={editing?'Edit Deal':'New Deal'} onClose={()=>setShowForm(false)}>
          <Input label="Deal Title *" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Enterprise partnership — Acme" />
          <Select label="Contact" value={form.contactId} onChange={e=>setForm({...form,contactId:e.target.value})}>
            <option value="">— No contact —</option>
            {contacts.map(c=><option key={c.id} value={c.id}>{c.name}{c.company?` (${c.company})`:''}</option>)}
          </Select>
          <Select label="Stage" value={form.stage} onChange={e=>setForm({...form,stage:e.target.value})}>
            {STAGES.map(s=><option key={s}>{s}</option>)}
          </Select>
          <Input label="Value ($)" type="number" value={form.value} onChange={e=>setForm({...form,value:e.target.value})} placeholder="25000" />
          <Textarea label="Notes" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Key context about this deal…" style={{ minHeight:70 }} />
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
            <Btn variant="ghost" onClick={()=>setShowForm(false)}>Cancel</Btn>
            <Btn onClick={save}>{editing?'Save Changes':'Add Deal'}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── TASKS VIEW ────────────────────────────────────────────────────────────────
function TasksView({ tasks, setTasks, contacts }) {
  const [showForm, setShowForm] = useState(false);
  const [filter, setFilter] = useState('upcoming');
  const blank = { title:'', contactId:'', due:'', priority:'Medium' };
  const [form, setForm] = useState(blank);

  const save = () => {
    if (!form.title.trim()) return;
    setTasks(ts=>[...ts,{...form,id:uid(),done:false,createdAt:now()}]);
    setShowForm(false); setForm(blank);
  };
  const toggle = id => setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del    = id => setTasks(ts=>ts.filter(t=>t.id!==id));

  const pc = { High:'var(--red)', Medium:'var(--amber)', Low:'var(--green)' };
  const isOverdue  = t => !t.done && t.due && t.due < today();
  const isDueToday = t => !t.done && t.due === today();

  const filtered = tasks.filter(t=>{
    if (filter==='upcoming') return !t.done;
    if (filter==='overdue')  return isOverdue(t);
    if (filter==='done')     return t.done;
    return true;
  }).sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(a.due&&b.due) return a.due.localeCompare(b.due);
    return 0;
  });

  const overdueCount = tasks.filter(isOverdue).length;
  const todayCount   = tasks.filter(isDueToday).length;

  return (
    <div className="fade-up">
      <div className="page-header" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:26 }}>Tasks & Follow-ups</h2>
          <p style={{ color:'var(--text2)', fontSize:14, marginTop:2 }}>
            {todayCount>0 && <span style={{ color:'var(--amber)', fontWeight:600 }}>{todayCount} due today · </span>}
            {overdueCount>0 && <span style={{ color:'var(--red)', fontWeight:600 }}>{overdueCount} overdue · </span>}
            {tasks.filter(t=>!t.done).length} pending
          </p>
        </div>
        <Btn onClick={()=>setShowForm(true)}>+ Add Task</Btn>
      </div>

      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {[['upcoming','Upcoming'],['overdue','Overdue'],['done','Done'],['all','All']].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)}
            style={{ background:filter===v?'var(--grad)':'var(--surface)', border:`1px solid ${filter===v?'transparent':'var(--border)'}`, borderRadius:8, padding:'7px 16px', color:filter===v?'#fff':'var(--text2)', fontSize:13, cursor:'pointer', fontWeight:600, transition:'all 0.15s' }}>
            {l}
          </button>
        ))}
      </div>

      {filtered.length===0 && <div style={{ color:'var(--text3)', textAlign:'center', padding:56, fontSize:15 }}>All clear! 🎉</div>}

      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {filtered.map(t=>{
          const c = contacts.find(x=>x.id===t.contactId);
          const overdue  = isOverdue(t);
          const dueToday = isDueToday(t);
          return (
            <Card key={t.id} style={{ padding:'14px 18px', opacity:t.done?0.55:1, borderColor:overdue?'#fecdd3':'var(--border)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                <button onClick={()=>toggle(t.id)}
                  style={{ width:22, height:22, borderRadius:'50%', border:`2px solid ${t.done?'var(--green)':'var(--border)'}`, background:t.done?'var(--green)':'transparent', cursor:'pointer', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:13, transition:'all 0.2s' }}>
                  {t.done?'✓':''}
                </button>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                    <span style={{ fontWeight:600, fontSize:15, textDecoration:t.done?'line-through':'none', color:t.done?'var(--text3)':'var(--text)' }}>{t.title}</span>
                    <Badge label={t.priority} color={pc[t.priority]||'#2563eb'} />
                  </div>
                  <div style={{ color:'var(--text2)', fontSize:13, marginTop:3, display:'flex', gap:10, flexWrap:'wrap' }}>
                    {c && <span>👤 {c.name}</span>}
                    {t.due && <span style={{ color:overdue?'var(--red)':dueToday?'var(--amber)':'var(--text2)', fontWeight:overdue||dueToday?600:400 }}>
                      {overdue?'⚠ Overdue: ':dueToday?'📅 Today: ':'📅 '}{t.due}
                    </span>}
                  </div>
                </div>
                <button onClick={()=>del(t.id)} style={{ background:'none', border:'none', color:'var(--text3)', cursor:'pointer', fontSize:20, padding:'0 4px', lineHeight:1 }}>×</button>
              </div>
            </Card>
          );
        })}
      </div>

      {showForm && (
        <Modal title="New Task" onClose={()=>setShowForm(false)}>
          <Input label="Task *" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Follow up with Alex re: proposal" />
          <Select label="Related Contact" value={form.contactId} onChange={e=>setForm({...form,contactId:e.target.value})}>
            <option value="">— No contact —</option>
            {contacts.map(c=><option key={c.id} value={c.id}>{c.name}{c.company?` (${c.company})`:''}</option>)}
          </Select>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 16px' }}>
            <Input label="Due Date" type="date" value={form.due} onChange={e=>setForm({...form,due:e.target.value})} />
            <Select label="Priority" value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}>
              {['High','Medium','Low'].map(p=><option key={p}>{p}</option>)}
            </Select>
          </div>
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
            <Btn variant="ghost" onClick={()=>setShowForm(false)}>Cancel</Btn>
            <Btn onClick={save}>Add Task</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── DASHBOARD VIEW ────────────────────────────────────────────────────────────
function Dashboard({ contacts, deals, tasks, interactions }) {
  const today_ = today();
  const overdue   = tasks.filter(t=>!t.done&&t.due&&t.due<today_);
  const dueToday  = tasks.filter(t=>!t.done&&t.due===today_);
  const openDeals = deals.filter(d=>d.stage!=='Closed Won'&&d.stage!=='Closed Lost');
  const wonDeals  = deals.filter(d=>d.stage==='Closed Won');
  const pipeVal   = openDeals.reduce((s,d)=>s+(parseFloat(d.value)||0),0);
  const wonVal    = wonDeals.reduce((s,d)=>s+(parseFloat(d.value)||0),0);

  const [quoteIdx, setQuoteIdx] = useState(() => Math.floor(Math.random() * QUOTES.length));
  const [quoteVisible, setQuoteVisible] = useState(true);
  useEffect(() => {
    const interval = setInterval(() => {
      setQuoteVisible(false);
      setTimeout(() => {
        setQuoteIdx(i => (i + 1) % QUOTES.length);
        setQuoteVisible(true);
      }, 500);
    }, 6000);
    return () => clearInterval(interval);
  }, []);

  const quote = QUOTES[quoteIdx];

  const feed = [...interactions].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,15);

  const Stat = ({ label, value, sub, color, icon }) => (
    <Card style={{ padding:'20px 22px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:-10, right:-10, fontSize:52, opacity:0.07 }}>{icon}</div>
      <div style={{ color:'var(--text2)', fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:8 }}>{label}</div>
      <div style={{ color, fontSize:34, fontWeight:800, fontFamily:'var(--font-display)', lineHeight:1 }}>{value}</div>
      {sub && <div style={{ color:'var(--text3)', fontSize:12, marginTop:6 }}>{sub}</div>}
    </Card>
  );

  return (
    <div className="fade-up">
      <div style={{ background:'linear-gradient(135deg, #0f2d5e 0%, #1a4a8a 60%, #2563eb 100%)', borderRadius:16, padding:'28px 32px', marginBottom:28, color:'#fff', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', right:-30, top:-30, width:180, height:180, background:'rgba(255,255,255,0.04)', borderRadius:'50%' }} />
        <div style={{ position:'absolute', right:80, bottom:-50, width:140, height:140, background:'rgba(255,255,255,0.03)', borderRadius:'50%' }} />
        <div style={{ position:'absolute', left:-20, bottom:-20, width:100, height:100, background:'rgba(201,168,76,0.08)', borderRadius:'50%' }} />
        <div style={{ position:'absolute', right:24, top:'50%', transform:'translateY(-50%)', fontSize:72, opacity:0.07 }}>⚓</div>

        <div style={{ fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.14em', color:'#c9a84c', marginBottom:10 }}>⚓ Conference Pipeline</div>

        <div style={{ transition:'opacity 0.5s ease', opacity: quoteVisible ? 1 : 0, minHeight:72 }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:22, fontWeight:600, lineHeight:1.35, maxWidth:580, fontStyle:'italic' }}>
            "{quote.text}"
          </div>
          <div style={{ fontSize:13, marginTop:10, color:'#c9a84c', fontWeight:600, letterSpacing:'0.04em' }}>
            — {quote.author}
          </div>
        </div>

        <div style={{ display:'flex', gap:6, marginTop:16 }}>
          {QUOTES.map((_,i) => (
            <button key={i} onClick={()=>{ setQuoteVisible(false); setTimeout(()=>{ setQuoteIdx(i); setQuoteVisible(true); }, 300); }}
              style={{ width: i===quoteIdx ? 20 : 6, height:6, borderRadius:99, background: i===quoteIdx ? '#c9a84c' : 'rgba(255,255,255,0.3)', border:'none', cursor:'pointer', padding:0, transition:'all 0.4s' }} />
          ))}
        </div>
      </div>

      <div className="stat-grid" style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14, marginBottom:28 }}>
        <Stat label="Contacts"     value={contacts.length}                   sub="in your network"             color="#2563eb"     icon="👥" />
        <Stat label="Open Deals"   value={openDeals.length}                  sub={`$${pipeVal.toLocaleString()} pipeline`}  color="#7c3aed"   icon="💼" />
        <Stat label="Closed Won"   value={wonDeals.length}                   sub={`$${wonVal.toLocaleString()} won`}        color="#059669"   icon="🏆" />
        <Stat label="Open Tasks"   value={tasks.filter(t=>!t.done).length}   sub={`${overdue.length} overdue`}              color={overdue.length?'#dc2626':'#d97706'} icon="✅" />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        <Card style={{ padding:'20px 22px' }}>
          <h3 style={{ fontFamily:'var(--font-display)', fontSize:17, marginBottom:16, color:'var(--text)' }}>Recent Activity</h3>
          {feed.length===0 && <p style={{ color:'var(--text3)', fontSize:13 }}>No activity yet. Start logging interactions!</p>}
          <div style={{ display:'flex', flexDirection:'column', gap:10, maxHeight:320, overflowY:'auto' }}>
            {feed.map(i=>{
              const c = contacts.find(x=>x.id===i.contactId);
              const cfg = ITYPE_CONFIG[i.type];
              return (
                <div key={i.id} style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
                  <div style={{ width:32, height:32, borderRadius:'50%', background:cfg.color+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>{cfg.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>
                      {i.type} {c?<span style={{ color:'var(--accent)' }}>with {c.name}</span>:''}
                    </div>
                    <div style={{ fontSize:12, color:'var(--text2)', marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{i.summary}</div>
                    <div style={{ fontSize:11, color:'var(--text3)', marginTop:2 }}>{timeAgo(i.createdAt)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>

        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          {(overdue.length>0||dueToday.length>0) && (
            <Card style={{ padding:'20px 22px' }}>
              <h3 style={{ fontFamily:'var(--font-display)', fontSize:17, marginBottom:14 }}>⚡ Needs Attention</h3>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {[...overdue,...dueToday].slice(0,4).map(t=>{
                  const od = t.due<today_;
                  return (
                    <div key={t.id} style={{ background:od?'#fff1f2':'#fffbeb', border:`1px solid ${od?'#fecdd3':'#fde68a'}`, borderRadius:8, padding:'9px 14px', display:'flex', alignItems:'center', gap:10 }}>
                      <span>{od?'⚠️':'📅'}</span>
                      <span style={{ fontSize:13, flex:1, fontWeight:500, color:'var(--text)' }}>{t.title}</span>
                      <span style={{ fontSize:12, color:od?'var(--red)':'var(--amber)', fontWeight:600 }}>{od?'Overdue':'Today'}</span>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          <Card style={{ padding:'20px 22px', flex:1 }}>
            <h3 style={{ fontFamily:'var(--font-display)', fontSize:17, marginBottom:16 }}>Pipeline Snapshot</h3>
            {STAGES.slice(0,5).map(stage=>{
              const cnt = deals.filter(d=>d.stage===stage).length;
              const max = Math.max(...STAGES.map(s=>deals.filter(d=>d.stage===s).length),1);
              return (
                <div key={stage} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                  <div style={{ width:88, color:'var(--text2)', fontSize:12, fontWeight:500 }}>{stage}</div>
                  <div style={{ flex:1, background:'#f1f5f9', borderRadius:99, height:8 }}>
                    <div style={{ width:`${(cnt/max)*100}%`, background:STAGE_COLOR[stage], borderRadius:99, height:'100%', transition:'width 0.7s cubic-bezier(.4,0,.2,1)' }} />
                  </div>
                  <div style={{ width:20, textAlign:'right', color:'var(--text2)', fontSize:13, fontWeight:600 }}>{cnt}</div>
                </div>
              );
            })}
          </Card>
        </div>
      </div>
    </div>
  );
}

// ── OUTREACH VIEW ─────────────────────────────────────────────────────────────
function OutreachView({ contacts, setContacts, tasks, setTasks, campaigns, setCampaigns }) {
  const [step, setStep]             = useState('list');
  const [editingId, setEditingId]   = useState(null);
  const [filterTag, setFilterTag]   = useState('');
  const [selectedIds, setSelectedIds] = useState([]);
  const [previewIdx, setPreviewIdx] = useState(0);
  const [sendIdx, setSendIdx]       = useState(0);

  const blankCampaign = { name:'', eventTag:'', subject:'', body:'Hi {{name}},\n\nGreat connecting with you at {{event}}!\n\nI wanted to follow up and introduce myself properly — I\'m [YOUR NAME] from [YOUR COMPANY]. [1-2 sentences about what you do and why you wanted to connect].\n\nWould love to find time to chat — are you open to a 15-minute call?\n\nBest,\n[YOUR NAME]' };
  const [form, setForm] = useState(blankCampaign);

  const merge = (template, contact, eventName) =>
    template
      .replace(/\{\{name\}\}/gi,    contact.name?.split(' ')[0] || contact.name || '')
      .replace(/\{\{fullname\}\}/gi, contact.name || '')
      .replace(/\{\{company\}\}/gi,  contact.company || '')
      .replace(/\{\{title\}\}/gi,    contact.title || '')
      .replace(/\{\{event\}\}/gi,    eventName || '');

  const allTags = [...new Set(contacts.flatMap(c => c.tags || []))].filter(Boolean);

  const filteredContacts = filterTag
    ? contacts.filter(c => (c.tags||[]).includes(filterTag))
    : contacts;

  const toggleSelect = id => setSelectedIds(ids =>
    ids.includes(id) ? ids.filter(x=>x!==id) : [...ids, id]
  );
  const selectAll   = () => setSelectedIds(filteredContacts.map(c=>c.id));
  const deselectAll = () => setSelectedIds([]);

  const selectedContacts = contacts.filter(c => selectedIds.includes(c.id));

  const openMailto = (contact) => {
    const subject = encodeURIComponent(merge(form.subject, contact, form.name));
    const body    = encodeURIComponent(merge(form.body,    contact, form.name));
    window.open(`mailto:${contact.email||''}?subject=${subject}&body=${body}`, '_blank');
  };

  const startSending = () => {
    setSendIdx(0);
    setStep('sending');
  };

  const markSentAndNext = () => {
    const contact = selectedContacts[sendIdx];
    setContacts(cs => cs.map(c => c.id === contact.id
      ? { ...c, lastEmailed: now(), emailedCampaigns: [...(c.emailedCampaigns||[]), form.name] }
      : c
    ));
    const followUpDate = new Date();
    followUpDate.setDate(followUpDate.getDate() + 3);
    const task = {
      id: uid(), title: `Follow up with ${contact.name}`, contactId: contact.id,
      due: followUpDate.toISOString().slice(0,10), priority:'High', done:false, createdAt:now(),
      note: `Sent intro email via "${form.name}" campaign`
    };
    setTasks(ts => [task, ...ts]);
    const logEntry = { contactId:contact.id, sentAt:now(), subject:merge(form.subject,contact,form.name) };
    setCampaigns(cps => {
      const existing = cps.find(c=>c.name===form.name);
      if (existing) return cps.map(c=>c.name===form.name ? {...c, sent:[...(c.sent||[]),logEntry]} : c);
      return [...cps, { id:uid(), name:form.name, eventTag:form.eventTag, createdAt:now(), sent:[logEntry] }];
    });
    if (sendIdx < selectedContacts.length - 1) setSendIdx(i=>i+1);
    else setStep('done');
  };

  const skipContact = () => {
    if (sendIdx < selectedContacts.length - 1) setSendIdx(i=>i+1);
    else setStep('done');
  };

  if (step === 'list') return (
    <div className="fade-up">
      <div className="page-header" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
        <div>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:26 }}>Outreach</h2>
          <p style={{ color:'var(--text2)', fontSize:14, marginTop:2 }}>Send personalised intro emails to your contacts</p>
        </div>
        <Btn onClick={()=>{ setForm(blankCampaign); setSelectedIds([]); setFilterTag(''); setStep('compose'); }}>
          ✉️ New Campaign
        </Btn>
      </div>

      {campaigns.length > 0 && (
        <div style={{ marginTop:24 }}>
          <h3 style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text2)', marginBottom:12 }}>Past Campaigns</h3>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {[...campaigns].reverse().map(c => (
              <Card key={c.id} style={{ padding:'16px 20px' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:8 }}>
                  <div>
                    <div style={{ fontWeight:700, fontSize:15, color:'var(--text)' }}>{c.name}</div>
                    <div style={{ color:'var(--text2)', fontSize:13, marginTop:2 }}>
                      {c.eventTag && <Badge label={`#${c.eventTag}`} color="#2563eb" />}
                      <span style={{ marginLeft:8 }}>{(c.sent||[]).length} emails sent · {fmtDate(c.createdAt)}</span>
                    </div>
                  </div>
                  <div style={{ display:'flex', gap:8 }}>
                    <Badge label={`${(c.sent||[]).length} sent`} color="#059669" />
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      )}

      {campaigns.length === 0 && (
        <Card style={{ padding:48, textAlign:'center', marginTop:24 }}>
          <div style={{ fontSize:48, marginBottom:16 }}>✉️</div>
          <div style={{ fontWeight:700, fontSize:16, color:'var(--text)', marginBottom:8 }}>No campaigns yet</div>
          <div style={{ color:'var(--text2)', fontSize:14, marginBottom:20 }}>Create your first outreach campaign to send personalised intro emails to your contacts.</div>
          <Btn onClick={()=>{ setForm(blankCampaign); setSelectedIds([]); setFilterTag(''); setStep('compose'); }}>Create First Campaign</Btn>
        </Card>
      )}
    </div>
  );

  if (step === 'compose') return (
    <div className="fade-up">
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
        <button onClick={()=>setStep('list')} style={{ background:'none', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:20, padding:0, lineHeight:1 }}>←</button>
        <div>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:26 }}>Compose Campaign</h2>
          <p style={{ color:'var(--text2)', fontSize:14, marginTop:2 }}>Use <code style={{ background:'#f1f5f9', padding:'1px 5px', borderRadius:4, fontSize:12 }}>{'{{name}}'}</code> <code style={{ background:'#f1f5f9', padding:'1px 5px', borderRadius:4, fontSize:12 }}>{'{{company}}'}</code> <code style={{ background:'#f1f5f9', padding:'1px 5px', borderRadius:4, fontSize:12 }}>{'{{event}}'}</code> as merge tags</p>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
        <div>
          <Card style={{ padding:24 }}>
            <h3 style={{ fontFamily:'var(--font-display)', fontSize:17, marginBottom:20 }}>Email Template</h3>
            <Input label="Campaign Name (e.g. iConnections Miami June 2025)"
              value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="iConnections Miami June 2025" />
            <Input label="Event Tag — filter contacts by this tag"
              value={form.eventTag} onChange={e=>setForm({...form,eventTag:e.target.value})} placeholder="miami-june-2025" />
            <Input label="Subject Line"
              value={form.subject} onChange={e=>setForm({...form,subject:e.target.value})} placeholder="Great connecting at {{event}}!" />
            <Textarea label="Email Body"
              value={form.body} onChange={e=>setForm({...form,body:e.target.value})}
              style={{ minHeight:220, fontFamily:'monospace', fontSize:13 }} />
            <div style={{ background:'#f8faff', borderRadius:8, padding:'10px 14px', fontSize:12, color:'var(--text2)', lineHeight:1.7 }}>
              <strong>Merge tags:</strong><br/>
              <code>{'{{name}}'}</code> First name &nbsp;·&nbsp; <code>{'{{fullname}}'}</code> Full name<br/>
              <code>{'{{company}}'}</code> Company &nbsp;·&nbsp; <code>{'{{event}}'}</code> Campaign name
            </div>
          </Card>
        </div>

        <div>
          <Card style={{ padding:24 }}>
            <h3 style={{ fontFamily:'var(--font-display)', fontSize:17, marginBottom:16 }}>Select Recipients</h3>

            <div style={{ marginBottom:16 }}>
              <label style={{ display:'block', color:'var(--text2)', fontSize:12, fontWeight:600, marginBottom:5, textTransform:'uppercase', letterSpacing:'0.06em' }}>Filter by Tag</label>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                <button onClick={()=>{ setFilterTag(''); deselectAll(); }}
                  style={{ background:filterTag===''?'var(--grad)':'#f1f5f9', color:filterTag===''?'#fff':'var(--text2)', border:'none', borderRadius:99, padding:'4px 12px', fontSize:12, fontWeight:600, cursor:'pointer' }}>
                  All ({contacts.length})
                </button>
                {allTags.map(t => (
                  <button key={t} onClick={()=>{ setFilterTag(t); deselectAll(); }}
                    style={{ background:filterTag===t?'var(--grad)':'#f1f5f9', color:filterTag===t?'#fff':'var(--text2)', border:'none', borderRadius:99, padding:'4px 12px', fontSize:12, fontWeight:600, cursor:'pointer' }}>
                    #{t} ({contacts.filter(c=>(c.tags||[]).includes(t)).length})
                  </button>
                ))}
              </div>
            </div>

            <div style={{ display:'flex', gap:8, marginBottom:12, alignItems:'center' }}>
              <span style={{ fontSize:13, color:'var(--text2)', flex:1 }}>{selectedIds.length} of {filteredContacts.length} selected</span>
              <Btn variant="secondary" size="sm" onClick={selectAll}>All</Btn>
              <Btn variant="ghost" size="sm" onClick={deselectAll}>None</Btn>
            </div>

            <div style={{ display:'flex', flexDirection:'column', gap:6, maxHeight:320, overflowY:'auto' }}>
              {filteredContacts.map(c => {
                const sel = selectedIds.includes(c.id);
                const alreadyEmailed = c.emailedCampaigns?.includes(form.name);
                return (
                  <div key={c.id} onClick={()=>!alreadyEmailed&&toggleSelect(c.id)}
                    style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 12px', borderRadius:8, cursor:alreadyEmailed?'default':'pointer',
                      background: sel?'#eff6ff':alreadyEmailed?'#f8fffe':'#f8faff',
                      border:`1px solid ${sel?'#bfdbfe':alreadyEmailed?'#a7f3d0':'var(--border)'}`,
                      opacity: alreadyEmailed ? 0.6 : 1 }}>
                    <div style={{ width:18, height:18, borderRadius:4, border:`2px solid ${sel?'#2563eb':'#cbd5e1'}`, background:sel?'#2563eb':'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      {sel && <span style={{ color:'#fff', fontSize:11, fontWeight:900 }}>✓</span>}
                    </div>
                    {avatar(c.name, 28)}
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:600, fontSize:13, color:'var(--text)' }}>{c.name}</div>
                      <div style={{ color:'var(--text3)', fontSize:11 }}>{c.email || 'no email'}</div>
                    </div>
                    {alreadyEmailed && <Badge label="Sent" color="#059669" />}
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      </div>

      <div style={{ display:'flex', gap:12, justifyContent:'flex-end', marginTop:20 }}>
        <Btn variant="ghost" onClick={()=>setStep('list')}>Cancel</Btn>
        <Btn variant="secondary" onClick={()=>{ if(selectedIds.length&&form.subject) setStep('preview'); }} disabled={!selectedIds.length||!form.subject||!form.name}>
          👁 Preview ({selectedIds.length})
        </Btn>
        <Btn onClick={()=>{ if(selectedIds.length&&form.subject&&form.name) startSending(); }} disabled={!selectedIds.length||!form.subject||!form.name}>
          🚀 Start Sending ({selectedIds.length})
        </Btn>
      </div>
    </div>
  );

  if (step === 'preview') {
    const c = selectedContacts[previewIdx];
    return (
      <div className="fade-up">
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
          <button onClick={()=>setStep('compose')} style={{ background:'none', border:'none', color:'var(--text2)', cursor:'pointer', fontSize:20, padding:0 }}>←</button>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:26 }}>Preview</h2>
        </div>
        <Card style={{ padding:28, maxWidth:680, margin:'0 auto' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              {avatar(c.name, 36)}
              <div>
                <div style={{ fontWeight:700 }}>{c.name}</div>
                <div style={{ fontSize:13, color:'var(--text2)' }}>{c.email}</div>
              </div>
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <button onClick={()=>setPreviewIdx(i=>Math.max(0,i-1))} disabled={previewIdx===0} style={{ background:'#f1f5f9', border:'none', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontSize:14, opacity:previewIdx===0?0.3:1 }}>◀</button>
              <span style={{ fontSize:13, color:'var(--text2)' }}>{previewIdx+1} / {selectedContacts.length}</span>
              <button onClick={()=>setPreviewIdx(i=>Math.min(selectedContacts.length-1,i+1))} disabled={previewIdx===selectedContacts.length-1} style={{ background:'#f1f5f9', border:'none', borderRadius:6, padding:'4px 10px', cursor:'pointer', fontSize:14, opacity:previewIdx===selectedContacts.length-1?0.3:1 }}>▶</button>
            </div>
          </div>
          <div style={{ background:'#f8faff', borderRadius:10, padding:20, fontFamily:'Georgia,serif' }}>
            <div style={{ fontWeight:700, fontSize:14, marginBottom:6, color:'var(--text)', fontFamily:'var(--font)' }}>
              Subject: {merge(form.subject, c, form.name)}
            </div>
            <div style={{ borderBottom:'1px solid var(--border)', marginBottom:16 }} />
            <div style={{ fontSize:14, lineHeight:1.8, color:'var(--text)', whiteSpace:'pre-wrap' }}>
              {merge(form.body, c, form.name)}
            </div>
          </div>
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end', marginTop:20 }}>
            <Btn variant="ghost" onClick={()=>setStep('compose')}>← Edit Template</Btn>
            <Btn onClick={startSending}>🚀 Start Sending</Btn>
          </div>
        </Card>
      </div>
    );
  }

  if (step === 'sending') {
    const c = selectedContacts[sendIdx];
    const pct = Math.round((sendIdx / selectedContacts.length) * 100);
    return (
      <div className="fade-up">
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:26 }}>Sending Campaign</h2>
          <Badge label={`${sendIdx} / ${selectedContacts.length}`} color="#2563eb" />
        </div>

        <div style={{ background:'#e2e8f0', borderRadius:99, height:8, marginBottom:28 }}>
          <div style={{ width:`${pct}%`, background:'var(--grad)', borderRadius:99, height:'100%', transition:'width 0.4s' }} />
        </div>

        <Card style={{ padding:28, maxWidth:680, margin:'0 auto' }}>
          <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:24, padding:'14px 18px', background:'#f8faff', borderRadius:10 }}>
            {avatar(c.name, 44)}
            <div>
              <div style={{ fontWeight:700, fontSize:16 }}>{c.name}</div>
              <div style={{ color:'var(--text2)', fontSize:13 }}>{c.company && `${c.company} · `}{c.email || <span style={{ color:'var(--red)' }}>⚠ No email on file</span>}</div>
            </div>
          </div>

          <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:10, padding:20, marginBottom:20, fontFamily:'Georgia,serif', maxHeight:220, overflowY:'auto' }}>
            <div style={{ fontWeight:700, fontSize:13, marginBottom:8, color:'var(--text)', fontFamily:'var(--font)' }}>
              ✉️ {merge(form.subject, c, form.name)}
            </div>
            <div style={{ fontSize:13, lineHeight:1.8, color:'var(--text)', whiteSpace:'pre-wrap' }}>
              {merge(form.body, c, form.name)}
            </div>
          </div>

          <div style={{ display:'flex', gap:10, justifyContent:'space-between', alignItems:'center' }}>
            <div style={{ fontSize:12, color:'var(--text3)' }}>
              ✅ Opens your email app pre-filled · Follow-up task auto-created for 3 days out
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <Btn variant="ghost" onClick={skipContact}>Skip</Btn>
              <Btn onClick={()=>{ openMailto(c); markSentAndNext(); }} disabled={!c.email}>
                📨 Open in Email {sendIdx+1}/{selectedContacts.length}
              </Btn>
            </div>
          </div>
        </Card>
      </div>
    );
  }

  if (step === 'done') return (
    <div className="fade-up" style={{ textAlign:'center', padding:'60px 20px' }}>
      <div style={{ fontSize:64, marginBottom:16 }}>🎉</div>
      <h2 style={{ fontFamily:'var(--font-display)', fontSize:28, marginBottom:8 }}>Campaign Complete!</h2>
      <p style={{ color:'var(--text2)', fontSize:15, marginBottom:8 }}>You've sent <strong>{selectedContacts.length}</strong> personalised emails.</p>
      <p style={{ color:'var(--text2)', fontSize:14, marginBottom:32 }}>Follow-up tasks have been created for each contact, due in 3 days.</p>
      <div style={{ display:'flex', gap:12, justifyContent:'center' }}>
        <Btn variant="secondary" onClick={()=>setStep('list')}>View Campaigns</Btn>
        <Btn onClick={()=>{ setForm(blankCampaign); setSelectedIds([]); setStep('compose'); }}>New Campaign</Btn>
      </div>
    </div>
  );

  return null;
}

// ── CSV IMPORT MODAL ──────────────────────────────────────────────────────────
const CONTACT_FIELDS = [
  { key:'name',    label:'Full Name' },
  { key:'email',   label:'Email' },
  { key:'company', label:'Company' },
  { key:'title',   label:'Title / Role' },
  { key:'phone',   label:'Phone' },
  { key:'linkedin',label:'LinkedIn URL' },
];

function CSVImportModal({ onClose, onImport, existingContacts }) {
  const [stage, setStage]     = useState('upload');
  const [rows, setRows]       = useState([]);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({});
  const [tag, setTag]         = useState('');
  const [type, setType]       = useState('Lead');
  const [result, setResult]   = useState(null);
  const fileRef = useRef(null);

  const parseFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data  = new Uint8Array(e.target.result);
        const wb    = XLSX.read(data, { type:'array' });
        const ws    = wb.Sheets[wb.SheetNames[0]];
        const json  = XLSX.utils.sheet_to_json(ws, { defval:'' });
        if (!json.length) return alert('File appears empty.');
        const hdrs  = Object.keys(json[0]);
        setHeaders(hdrs);
        setRows(json);
        const auto = {};
        CONTACT_FIELDS.forEach(f => {
          const match = hdrs.find(h => h.toLowerCase().replace(/[\s_]/g,'').includes(f.key.toLowerCase()) ||
            (f.key==='name' && /^(full.?name|name|contact)$/i.test(h)) ||
            (f.key==='email' && /email/i.test(h)) ||
            (f.key==='company' && /company|org|firm/i.test(h)) ||
            (f.key==='title' && /title|role|position/i.test(h)) ||
            (f.key==='phone' && /phone|mobile|cell/i.test(h)) ||
            (f.key==='linkedin' && /linkedin/i.test(h))
          );
          if (match) auto[f.key] = match;
        });
        setMapping(auto);
        setStage('map');
      } catch(err) {
        alert('Could not read file. Please use CSV or Excel (.xlsx).');
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer?.files[0] || e.target.files[0];
    if (file) parseFile(file);
  };

  const doImport = () => {
    const existingEmails = new Set(existingContacts.map(c=>(c.email||'').toLowerCase()).filter(Boolean));
    let imported = 0, skipped = 0;
    const newContacts = [];
    rows.forEach(row => {
      const contact = { id:uid(), createdAt:now(), type, tags: tag ? tag.split(',').map(t=>t.trim()).filter(Boolean) : [] };
      CONTACT_FIELDS.forEach(f => {
        const col = mapping[f.key];
        contact[f.key] = col ? (row[col]||'').toString().trim() : '';
      });
      if (!contact.name && !contact.email) { skipped++; return; }
      if (contact.email && existingEmails.has(contact.email.toLowerCase())) { skipped++; return; }
      newContacts.push(contact);
      if (contact.email) existingEmails.add(contact.email.toLowerCase());
      imported++;
    });
    onImport(newContacts);
    setResult({ imported, skipped });
    setStage('done');
  };

  const mappedCount = Object.values(mapping).filter(Boolean).length;

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:300, backdropFilter:'blur(6px)', padding:16 }}>
      <div className="fade-up" style={{ background:'var(--surface)', borderRadius:20, width:'100%', maxWidth:580, maxHeight:'92vh', overflowY:'auto', boxShadow:'var(--shadow-lg)' }}>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'22px 24px 0' }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:20 }}>
            {stage==='upload'  && '📂 Import Contacts'}
            {stage==='map'     && '🔗 Map Your Columns'}
            {stage==='preview' && '👁 Preview Import'}
            {stage==='done'    && '✅ Import Complete'}
          </div>
          <button onClick={onClose} style={{ background:'#f1f5f9', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', fontSize:18, color:'var(--text2)', display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
        </div>

        <div style={{ padding:24 }}>

          {stage==='upload' && (
            <div>
              <p style={{ color:'var(--text2)', fontSize:14, marginBottom:20, lineHeight:1.6 }}>
                Upload a <strong>CSV or Excel file</strong> from any source — event attendee lists, exported contacts, prospect lists. We'll help you match the columns.
              </p>
              <div onClick={()=>fileRef.current?.click()}
                onDrop={handleDrop} onDragOver={e=>e.preventDefault()}
                style={{ border:'2px dashed #bfdbfe', borderRadius:14, padding:'40px 20px', textAlign:'center', cursor:'pointer', background:'#f8faff', transition:'all 0.2s' }}
                onMouseEnter={e=>e.currentTarget.style.background='#eff6ff'}
                onMouseLeave={e=>e.currentTarget.style.background='#f8faff'}>
                <div style={{ fontSize:48, marginBottom:12 }}>📊</div>
                <div style={{ fontWeight:700, fontSize:15, color:'var(--text)', marginBottom:6 }}>Drop your file here</div>
                <div style={{ color:'var(--text2)', fontSize:13 }}>or click to browse · CSV or Excel (.xlsx)</div>
                <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleDrop} style={{ display:'none' }} />
              </div>
              <div style={{ marginTop:16, background:'#f8faff', borderRadius:10, padding:'12px 16px', fontSize:12, color:'var(--text2)', lineHeight:1.8 }}>
                <strong>Works with exports from:</strong> LinkedIn, HubSpot, Salesforce, Excel, Google Sheets, event platforms (Whova, Bizzabo, etc.)
              </div>
            </div>
          )}

          {stage==='map' && (
            <div>
              <div style={{ background:'#eff6ff', border:'1px solid #bfdbfe', borderRadius:10, padding:'10px 16px', marginBottom:20, fontSize:13, color:'#1e40af' }}>
                📊 <strong>{rows.length} rows detected</strong> from your file. Match each field below to the right column.
              </div>

              <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:20 }}>
                {CONTACT_FIELDS.map(f => (
                  <div key={f.key} style={{ display:'grid', gridTemplateColumns:'140px 1fr', alignItems:'center', gap:12 }}>
                    <label style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{f.label}</label>
                    <select value={mapping[f.key]||''} onChange={e=>setMapping({...mapping,[f.key]:e.target.value})}
                      style={{ background:'#f8faff', border:`1px solid ${mapping[f.key]?'#86efac':'var(--border)'}`, borderRadius:8, padding:'8px 10px', fontSize:13, color:'var(--text)', outline:'none' }}>
                      <option value="">— skip —</option>
                      {headers.map(h=><option key={h} value={h}>{h}</option>)}
                    </select>
                  </div>
                ))}
              </div>

              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 }}>
                <div>
                  <label style={{ display:'block', color:'var(--text2)', fontSize:12, fontWeight:600, marginBottom:5, textTransform:'uppercase', letterSpacing:'0.05em' }}>Tag this import</label>
                  <input value={tag} onChange={e=>setTag(e.target.value)} placeholder="e.g. iconnections-miami-2025"
                    style={{ width:'100%', background:'#f8faff', border:'1px solid var(--border)', borderRadius:8, padding:'9px 12px', fontSize:13, color:'var(--text)', outline:'none' }} />
                </div>
                <div>
                  <label style={{ display:'block', color:'var(--text2)', fontSize:12, fontWeight:600, marginBottom:5, textTransform:'uppercase', letterSpacing:'0.05em' }}>Default Type</label>
                  <select value={type} onChange={e=>setType(e.target.value)}
                    style={{ width:'100%', background:'#f8faff', border:'1px solid var(--border)', borderRadius:8, padding:'9px 12px', fontSize:13, color:'var(--text)', outline:'none' }}>
                    {CTYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
              </div>

              <div style={{ marginBottom:20 }}>
                <div style={{ fontSize:12, fontWeight:700, color:'var(--text2)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:8 }}>Preview (first 3 rows)</div>
                <div style={{ overflowX:'auto', borderRadius:10, border:'1px solid var(--border)' }}>
                  <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                    <thead>
                      <tr style={{ background:'#f8faff' }}>
                        {CONTACT_FIELDS.filter(f=>mapping[f.key]).map(f=>(
                          <th key={f.key} style={{ padding:'8px 12px', textAlign:'left', color:'var(--text2)', fontWeight:600, borderBottom:'1px solid var(--border)', whiteSpace:'nowrap' }}>{f.label}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.slice(0,3).map((row,i)=>(
                        <tr key={i} style={{ borderBottom:'1px solid var(--border)' }}>
                          {CONTACT_FIELDS.filter(f=>mapping[f.key]).map(f=>(
                            <td key={f.key} style={{ padding:'8px 12px', color:'var(--text)', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                              {row[mapping[f.key]]||<span style={{ color:'var(--text3)' }}>—</span>}
                            </td>
                          ))}

                      ))}

              <div style={{ display:'flex', gap:10, justifyContent:'space-between', alignItems:'center' }}>
                <div style={{ fontSize:13, color:'var(--text2)' }}>
                  {mappedCount} field{mappedCount!==1?'s':''} mapped · {rows.length} contacts to import

                <div style={{ display:'flex', gap:10 }}>
                  <Btn variant="ghost" onClick={()=>setStage('upload')}>← Back</Btn>

          {stage==='done' && result && (
            <div style={{ textAlign:'center', padding:'32px 20px' }}>
              <div style={{ fontSize:56, marginBottom:16 }}>🎉</div>
              <h3 style={{ fontFamily:'var(--font-display)', fontSize:24, marginBottom:8 }}>Import Complete!</h3>
              <div style={{ display:'flex', gap:16, justifyContent:'center', margin:'20px 0' }}>

                  <div style={{ fontSize:13, color:'#166534', fontWeight:600 }}>Imported</div>

// ── SCANNER MODAL ─────────────────────────────────────────────────────────────
function ScannerModal({ onClose, onSave, apiKey }) {
  const [stage, setStage]       = useState('choose');
  const [scanType, setScanType] = useState(null);
  const [imgData, setImgData]   = useState(null);
  const [results, setResults]   = useState([]);
  const [errMsg, setErrMsg]     = useState('');
  const videoRef  = useRef(null);
  const streamRef = useRef(null);
  const canvasRef = useRef(null);

  const stopCamera = () => {
    if (streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
  };
  useEffect(() => () => stopCamera(), []);

  const startCamera = async (type) => {
    setScanType(type);
    setStage('capturing');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; videoRef.current.play(); }
    } catch(e) {
      setErrMsg('Camera access denied. Please allow camera permissions and try again.');
      setStage('error');
    }
  };

  const capture = () => {
    const video  = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const MAX = 1280;
    let w = video.videoWidth;
    let h = video.videoHeight;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
    canvas.width  = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    const data = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
    setImgData(data);
    stopCamera();
    setStage('preview');
  };

  const processImage = async () => {
    setStage('processing');
    const prompt = scanType === 'linkedin'
      ? `This image may contain a LinkedIn QR code. If you see a LinkedIn QR code, extract the LinkedIn profile URL from it (it will be linkedin.com/in/...). Return ONLY valid JSON like:
{"type":"linkedin","contacts":[{"linkedinUrl":"https://linkedin.com/in/username","name":""}]}
If you cannot detect a LinkedIn QR code, return: {"type":"unknown"}`
      : `This image contains one or more business cards. Extract EVERY card you can see as a separate contact. Return ONLY valid JSON — an array, no markdown, no explanation:
{"type":"cards","contacts":[{"name":"","title":"","company":"","email":"","phone":"","linkedin":""},{"name":"","title":"","company":"","email":"","phone":"","linkedin":""}]}
Include one object per card. Use empty string "" for any field not found on that card. Do not guess or invent data.`;

    try {
      if (!apiKey) { setErrMsg('No API key found — please reload the app and enter your key.'); setStage('error'); return; }
      const res = await fetch('https://sparkling-term-1052.justin-ryan.workers.dev', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': apiKey,
        },
        body: JSON.stringify({
          model:'claude-sonnet-4-5',
          max_tokens:1200,
          messages:[{ role:'user', content:[
            { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:imgData }},
            { type:'text',  text: prompt }
          ]}]
        })
      });
      const data  = await res.json();
      const raw   = data.content?.find(b=>b.type==='text')?.text || '';
      const clean = raw.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);

      if (parsed.type === 'unknown') {
        setErrMsg("Couldn't detect a LinkedIn QR code. Make sure it's clearly visible and try again.");
        setStage('error'); return;
      }

      const base = parsed.type === 'linkedin'
        ? parsed.contacts.map(c => ({ name:'', email:'', phone:'', company:'', title:'', linkedin: c.linkedinUrl||'', type:'Prospect', tags:'linkedin-scan', keep:true }))
        : parsed.contacts.map(c => ({
            // ✅ CHANGE 1: Default tag is now 'MFA NYC Ops Conf'
            name:c.name||'', email:c.email||'', phone:c.phone||'', company:c.company||'', title:c.title||'', linkedin:c.linkedin||'',
            type:'Lead', tags:'MFA NYC Ops Conf', keep:true
          }));

      if (!base.length) {
        setErrMsg("No cards detected. Try a clearer photo with better lighting.");
        setStage('error'); return;
      }
      setResults(base);
      setStage('review');
    } catch(e) {
      setErrMsg('Error: ' + e.message + ' | Status: ' + (e.status||'none') + ' | ' + e.toString());
      setStage('error');
    }
  };

  const saveAll = () => {
    const toSave = results.filter(r => r.keep && (r.name.trim() || r.linkedin.trim()));
    toSave.forEach(r => {
      const { keep, ...rest } = r;
      const tags = typeof rest.tags === 'string'
        ? rest.tags.split(',').map(t=>t.trim()).filter(Boolean)
        : (rest.tags||[]);
      onSave({ ...rest, tags, id:uid(), createdAt:now(), scannedAt:now() });
    });
    onClose();
  };

  const R = (idx, f, v) => setResults(rs => rs.map((r,i) => i===idx ? {...r,[f]:v} : r));
  const toggleKeep = idx => setResults(rs => rs.map((r,i) => i===idx ? {...r,keep:!r.keep} : r));

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.6)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:300, backdropFilter:'blur(8px)', padding:16 }}>
      <div className="fade-up" style={{ background:'var(--surface)', borderRadius:20, width:'100%', maxWidth:560, maxHeight:'92vh', overflowY:'auto', boxShadow:'var(--shadow-lg)' }}>

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'20px 24px 0' }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:20, color:'var(--text)' }}>
            {stage==='choose'     && '📸 Add via Scan'}
            {stage==='capturing'  && (scanType==='card'?'📇 Scan Business Cards':'🔗 Scan LinkedIn QR')}
            {stage==='preview'    && 'Confirm Image'}
            {stage==='processing' && 'Reading with AI…'}
            {stage==='review'     && (scanType==='linkedin'?'LinkedIn Profile Found':`${results.length} Card${results.length!==1?'s':''} Found`)}
            {stage==='error'      && 'Something went wrong'}
          </div>
          <button onClick={()=>{stopCamera();onClose();}} style={{ background:'#f1f5f9', border:'none', borderRadius:8, width:30, height:30, cursor:'pointer', fontSize:18, color:'var(--text2)', display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
        </div>

        <div style={{ padding:24 }}>

          {stage==='choose' && (
            <div>
              <p style={{ color:'var(--text2)', fontSize:14, marginBottom:24, lineHeight:1.6 }}>
                Point your camera at <strong>one or more business cards</strong> laid flat, or a <strong>LinkedIn QR code</strong>. AI will extract every contact automatically.
              </p>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
                <button onClick={()=>startCamera('card')}
                  style={{ background:'linear-gradient(135deg,#eff6ff,#dbeafe)', border:'2px solid #bfdbfe', borderRadius:14, padding:'24px 16px', cursor:'pointer', textAlign:'center', transition:'all 0.2s' }}
                  onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
                  onMouseLeave={e=>e.currentTarget.style.transform=''}>
                  <div style={{ fontSize:40, marginBottom:10 }}>📇</div>
                  <div style={{ fontWeight:700, color:'#1e40af', fontSize:15 }}>Business Cards</div>
                  <div style={{ color:'#3b82f6', fontSize:12, marginTop:4 }}>1 card or many — AI reads them all</div>
                </button>
                <button onClick={()=>startCamera('linkedin')}
                  style={{ background:'linear-gradient(135deg,#f5f3ff,#ede9fe)', border:'2px solid #ddd6fe', borderRadius:14, padding:'24px 16px', cursor:'pointer', textAlign:'center', transition:'all 0.2s' }}
                  onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
                  onMouseLeave={e=>e.currentTarget.style.transform=''}>
                  <div style={{ fontSize:40, marginBottom:10 }}>🔗</div>

          {stage==='capturing' && (

                <video ref={videoRef} autoPlay playsInline muted style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', pointerEvents:'none' }}>
                  <div style={{ border:`2px solid ${scanType==='linkedin'?'#a78bfa':'#60a5fa'}`, borderRadius: scanType==='linkedin'?12:8,
