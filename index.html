          {stage==='review' && results.length > 0 && (
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16, padding:'10px 14px', background:'#eff6ff', borderRadius:10, border:'1px solid #bfdbfe' }}>
                <span style={{ fontSize:22 }}>{scanType==='linkedin'?'🔗':'📇'}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:'#1e40af' }}>
                    {results.length} contact{results.length!==1?'s':''} detected — review before saving
                  </div>
                  <div style={{ fontSize:12, color:'var(--text2)' }}>Uncheck any you don't want to save. Edit fields as needed.</div>
                </div>
              </div>

              <div style={{ display:'flex', flexDirection:'column', gap:14, maxHeight:460, overflowY:'auto', paddingRight:4 }}>
                {results.map((r, idx) => (
                  <div key={idx} style={{ border:`2px solid ${r.keep?'#bfdbfe':'#e2e8f0'}`, borderRadius:12, padding:16, background:r.keep?'#f8faff':'#f8f8f8', opacity:r.keep?1:0.5, transition:'all 0.2s' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                      <div style={{ fontWeight:700, fontSize:13, color:'var(--text2)', textTransform:'uppercase', letterSpacing:'0.06em' }}>
                        Card {idx+1}
                      </div>
                      <button onClick={()=>toggleKeep(idx)}
                        style={{ display:'flex', alignItems:'center', gap:6, background:r.keep?'#dcfce7':'#f1f5f9', border:`1px solid ${r.keep?'#86efac':'#cbd5e1'}`, borderRadius:99, padding:'3px 10px', cursor:'pointer', fontSize:12, fontWeight:600, color:r.keep?'#15803d':'#64748b' }}>
                        {r.keep ? '✓ Include' : '✕ Skip'}
                      </button>
                    </div>
                    {r.keep && (
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 12px' }}>
                        <div style={{ gridColumn:'1/-1' }}>
                          <Input label="Full Name *" value={r.name} onChange={e=>R(idx,'name',e.target.value)} placeholder="Jane Smith" />
                        </div>
                        <Input label="Title" value={r.title||''} onChange={e=>R(idx,'title',e.target.value)} placeholder="VP of Sales" />
                        <Input label="Company" value={r.company||''} onChange={e=>R(idx,'company',e.target.value)} placeholder="Acme Corp" />
                        <Input label="Email" value={r.email||''} onChange={e=>R(idx,'email',e.target.value)} placeholder="jane@acme.com" />
                        <Input label="Phone" value={r.phone||''} onChange={e=>R(idx,'phone',e.target.value)} placeholder="+1 305 000 0000" />
                        <div style={{ gridColumn:'1/-1' }}>
                          <Input label="LinkedIn" value={r.linkedin||''} onChange={e=>R(idx,'linkedin',e.target.value)} placeholder="https://linkedin.com/in/…" />
                        </div>
                        <Select label="Type" value={r.type} onChange={e=>R(idx,'type',e.target.value)}>
                          {CTYPES.map(t=><option key={t}>{t}</option>)}
                        </Select>
                        <Input label="Tags" value={r.tags||''} onChange={e=>R(idx,'tags',e.target.value)} placeholder="MFA NYC Ops Conf, warm-lead" />
                      </div>
                    )}
                  </div>
                ))}
              </div>

              <div style={{ display:'flex', gap:10, justifyContent:'space-between', alignItems:'center', marginTop:16 }}>
                <span style={{ fontSize:13, color:'var(--text2)' }}>{results.filter(r=>r.keep).length} of {results.length} selected</span>
                <div style={{ display:'flex', gap:10 }}>
                  <Btn variant="ghost" onClick={()=>{setStage('choose');setResults([]);setImgData(null);}}>Start Over</Btn>
                  <Btn onClick={saveAll} disabled={!results.some(r=>r.keep&&(r.name.trim()||r.linkedin.trim()))}>
                    ✅ Save {results.filter(r=>r.keep).length} Contact{results.filter(r=>r.keep).length!==1?'s':''}
                  </Btn>
                </div>
              </div>
            </div>
          )}

          {stage==='error' && (
            <div style={{ textAlign:'center', padding:'20px 0' }}>
              <div style={{ fontSize:48, marginBottom:16 }}>😕</div>
              <div style={{ color:'var(--text)', fontWeight:600, fontSize:15, marginBottom:8 }}>Couldn't process that image</div>
              <div style={{ color:'var(--text2)', fontSize:13, marginBottom:24, lineHeight:1.6 }}>{errMsg}</div>
              <Btn onClick={()=>{setStage('choose');setImgData(null);setErrMsg('');}}>Try Again</Btn>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

// ── APP SHELL ─────────────────────────────────────────────────────────────────
function App() {
  const [contacts,     setContacts]     = useLS(SK.contacts, []);
  const [deals,        setDeals]        = useLS(SK.deals, []);
  const [tasks,        setTasks]        = useLS(SK.tasks, []);
  const [interactions, setInteractions] = useLS(SK.interactions, []);
  const [campaigns,    setCampaigns]    = useLS(SK.campaigns, []);
  const [tab, setTab]             = useState('dashboard');
  const [showScanner, setShowScanner] = useState(false);
  const [showImport,  setShowImport]  = useState(false);
  const [apiKey, setApiKey] = useState('');

  useEffect(() => {
    if (window.__splashBurst) window.__splashBurst();
  }, []);

  const overdueCount = tasks.filter(t=>!t.done&&t.due&&t.due<today()).length;

  const TABS = [
    { id:'dashboard', label:'Dashboard', icon:'◈' },
    { id:'contacts',  label:'Contacts',  icon:'◉', badge:contacts.length },
    { id:'pipeline',  label:'Pipeline',  icon:'◆', badge:deals.filter(d=>d.stage!=='Closed Won'&&d.stage!=='Closed Lost').length },
    { id:'tasks',     label:'Tasks',     icon:'◇', badge:overdueCount||null, badgeRed:true },
    { id:'outreach',  label:'Outreach',  icon:'✉️', badge:campaigns.length||null },
  ];

  const handleScanSave = (contact) => {
    setContacts(cs=>[...cs, contact]);
    setTab('contacts');
  };

  const handleImport = (newContacts) => {
    setContacts(cs => [...cs, ...newContacts]);
    setTab('contacts');
  };

  const navBtn = (t, mobile=false) => (
    <button key={t.id} onClick={()=>setTab(t.id)}
      style={{ display:'flex', flexDirection:mobile?'column':'row', alignItems:'center', gap:mobile?2:10, padding:mobile?'8px 0':'10px 14px', borderRadius:mobile?6:10, border:'none',
        background:tab===t.id?(mobile?'transparent':'#eff6ff'):'transparent',
        color:tab===t.id?'var(--accent)':'var(--text2)',
        cursor:'pointer', fontFamily:'var(--font)', fontWeight:600, fontSize:mobile?10:14, flex:mobile?1:undefined,
        borderTop:mobile&&tab===t.id?'2px solid var(--accent)':'2px solid transparent',
        transition:'all 0.15s' }}>
      <span style={{ fontSize:mobile?20:15 }}>{t.icon}</span>
      <span style={{ flex:mobile?undefined:1 }}>{t.label}</span>
      {t.badge>0 && <span style={{ background:t.badgeRed?'var(--red)':'var(--accent)', color:'#fff', borderRadius:99, padding:'1px 7px', fontSize:10, fontWeight:700, minWidth:18, textAlign:'center' }}>{t.badge}</span>}
    </button>
  );

  const props = { contacts, setContacts, deals, setDeals, tasks, setTasks, interactions, setInteractions, campaigns, setCampaigns };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>

      {!apiKey && (
        <div style={{ position:'fixed', inset:0, background:'rgba(15,23,42,0.7)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:400, backdropFilter:'blur(8px)', padding:24 }}>
          <div style={{ background:'var(--surface)', borderRadius:20, padding:32, width:'100%', maxWidth:400, boxShadow:'var(--shadow-lg)', textAlign:'center' }}>
            <div style={{ fontSize:48, marginBottom:16 }}>🔑</div>
            <h2 style={{ fontFamily:'var(--font-display)', fontSize:22, marginBottom:8 }}>Enter API Key</h2>
            <p style={{ color:'var(--text2)', fontSize:14, marginBottom:24, lineHeight:1.6 }}>Paste your Anthropic API key to enable business card scanning. It's never saved or stored.</p>
            <input
              type="password"
              placeholder="sk-ant-api03-..."
              onKeyDown={e => { if(e.key==='Enter' && e.target.value.startsWith('sk-')) setApiKey(e.target.value); }}
              style={{ width:'100%', background:'#f8faff', border:'1px solid var(--border)', borderRadius:10, padding:'12px 14px', fontSize:14, color:'var(--text)', outline:'none', marginBottom:16, textAlign:'center' }}
              id="apiKeyInput"
            />
            <Btn onClick={()=>{ const v=document.getElementById('apiKeyInput').value; if(v.startsWith('sk-')) setApiKey(v); }} style={{ width:'100%', justifyContent:'center' }}>
              Unlock App
            </Btn>
          </div>
        </div>
      )}

      {/* Desktop sidebar */}
      <div className="desktop-sidebar" style={{ width:220, background:'var(--surface)', borderRight:'1px solid var(--border)', padding:'24px 12px', flexDirection:'column', flexShrink:0, boxShadow:'2px 0 8px rgba(15,23,42,0.04)' }}>
        <div style={{ paddingLeft:8, marginBottom:32 }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:15, fontWeight:700, background:'var(--grad)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text', lineHeight:1.3 }}>Miami iConnections</div>
          <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--accent)', marginTop:2 }}>Dashboard</div>
        </div>
        <nav style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {TABS.map(t=>navBtn(t))}
        </nav>
        <div style={{ marginTop:16, display:'flex', flexDirection:'column', gap:8 }}>
          <button onClick={()=>setShowScanner(true)}
            style={{ width:'100%', background:'var(--grad2)', border:'none', borderRadius:10, padding:'11px 14px', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', gap:8, justifyContent:'center', boxShadow:'0 2px 8px rgba(124,58,237,0.3)', transition:'all 0.2s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            <span style={{ fontSize:18 }}>📸</span> Scan Contact
          </button>
          <button onClick={()=>setShowImport(true)}
            style={{ width:'100%', background:'var(--grad)', border:'none', borderRadius:10, padding:'11px 14px', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer', display:'flex', alignItems:'center', gap:8, justifyContent:'center', boxShadow:'0 2px 8px rgba(37,99,235,0.25)', transition:'all 0.2s' }}
            onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
            onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
            <span style={{ fontSize:18 }}>📂</span> Import List
          </button>
        </div>
        <div style={{ marginTop:'auto', paddingTop:20, borderTop:'1px solid var(--border)', color:'var(--text3)', fontSize:11, paddingLeft:8, lineHeight:1.8 }}>
          {contacts.length} contacts · {deals.length} deals<br/>
          <span style={{ fontSize:10 }}>Data saved locally</span>
        </div>
      </div>

      {/* Main */}
      <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column' }}>
        <div className="main-content" style={{ flex:1, padding:'32px 36px', maxWidth:1100, width:'100%', margin:'0 auto' }}>
          {tab==='dashboard' && <Dashboard {...props} />}
          {tab==='contacts'  && <ContactsView {...props} />}
          {tab==='pipeline'  && <PipelineView {...props} />}
          {tab==='tasks'     && <TasksView {...props} />}
          {tab==='outreach'  && <OutreachView {...props} />}
        </div>
      </div>

      {/* Mobile bottom nav */}
      <div className="mobile-nav" style={{ position:'fixed', bottom:0, left:0, right:0, background:'var(--surface)', borderTop:'1px solid var(--border)', padding:'4px 8px 8px', zIndex:50, boxShadow:'0 -4px 16px rgba(15,23,42,0.08)' }}>
        <button onClick={()=>setShowScanner(true)}
          style={{ position:'absolute', top:-24, left:'38%', transform:'translateX(-50%)', width:48, height:48, borderRadius:'50%', background:'var(--grad2)', border:'3px solid var(--bg)', color:'#fff', fontSize:20, cursor:'pointer', boxShadow:'0 4px 16px rgba(124,58,237,0.4)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:60 }}>
          📸
        </button>
        <button onClick={()=>setShowImport(true)}
          style={{ position:'absolute', top:-24, left:'62%', transform:'translateX(-50%)', width:48, height:48, borderRadius:'50%', background:'var(--grad)', border:'3px solid var(--bg)', color:'#fff', fontSize:20, cursor:'pointer', boxShadow:'0 4px 16px rgba(37,99,235,0.35)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:60 }}>
          📂
        </button>
        {TABS.map(t=>navBtn(t, true))}
      </div>

      {/* Modals */}
      {showScanner && <ScannerModal onClose={()=>setShowScanner(false)} onSave={handleScanSave} apiKey={apiKey} />}
      {showImport  && <CSVImportModal onClose={()=>setShowImport(false)} onImport={handleImport} existingContacts={contacts} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
